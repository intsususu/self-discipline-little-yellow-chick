<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Traditional Strength Training</title>
<style>
 :root{--bg:#f6f7f9;--card:#fff;--ink:#1f2430;--muted:#6b7280;--line:#e6e8ec;--accent:#2563eb}
 *{box-sizing:border-box}
 body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--ink);line-height:1.5}
 header{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.93);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
 .wrap{max-width:1180px;margin:0 auto;padding:12px 18px;display:flex;flex-wrap:wrap;align-items:center;gap:10px}
 h1{font-size:17px;margin:0;font-weight:700}.sub{color:var(--muted);font-size:13px}.grow{flex:1}
 input[type=search]{width:210px;max-width:44vw;padding:8px 12px;border:1px solid var(--line);border-radius:9px;font-size:14px;outline:none;background:#fff}
 input[type=search]:focus{border-color:var(--accent)}
 .seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:#fff}
 .seg button{border:0;background:#fff;padding:8px 11px;font-size:13px;cursor:pointer;color:var(--muted)}
 .seg button.on{background:var(--accent);color:#fff}
 .lnk{font-size:12.5px;color:var(--accent);background:none;border:0;cursor:pointer;padding:4px;text-decoration:none;display:inline-flex;align-items:center}
 main{max-width:1380px;margin:0 auto;padding:16px 18px;display:flex;gap:22px;align-items:flex-start}
 .left{flex:1;min-width:0}
 .right{width:430px;flex:none;position:sticky;top:70px}
 .anat{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px}
 .anat h3{margin:0 0 2px;font-size:14px}.anat .hint{font-size:12px;color:var(--muted);margin:0 0 6px}
 #bodysvg{width:100%;height:auto;display:block;max-height:calc(100vh - 150px)}
 #bodysvg .nm{fill:#c2cad4;stroke:#a9b1bd;stroke-width:.16}
 #bodysvg .r{fill:#b1bbc8;stroke:#8b96a4;stroke-width:.2;transition:fill .12s,filter .12s;cursor:pointer}
 #bodysvg .r:hover{fill:#d58b67}
 #bodysvg .r.hot{fill:#ef6a3d;stroke:#c44a23;filter:drop-shadow(0 0 1.2px rgba(196,74,35,.5))}
 #bodysvg .vl{fill:#9aa1ab;font-size:3.4px;text-anchor:middle;font-family:inherit}
 .acap{margin-top:8px;font-size:13px;color:var(--ink);min-height:20px}
 .acap b{color:#c44a23;font-weight:700}
 .area{margin:0 0 14px}
 .areahead{display:flex;align-items:baseline;gap:10px;margin:2px 0 8px;padding:0 2px}
 .areahead h2{margin:0;font-size:14px;font-weight:800;color:#111827}
 .areahead span{font-size:12px;color:var(--muted)}
 .grp{margin:0 0 9px;border:1px solid var(--line);border-radius:12px;background:#fff;overflow:hidden}
 .grphead{display:flex;align-items:center;gap:10px;cursor:pointer;padding:12px 14px;user-select:none}
 .grphead h2{font-size:15.5px;margin:0;font-weight:700}.grphead .cnt{color:var(--muted);font-size:13px;font-weight:600}
 .grphead .bd{color:var(--muted);font-size:12px;margin-left:auto;font-weight:400;text-align:right;max-width:55%}
 .chev{transition:transform .15s;color:var(--muted);font-size:13px}
 .grp.collapsed .chev{transform:rotate(-90deg)}.grp.collapsed .grpbody{display:none}
 .grp.active{border-color:#e8633a}
 .grpbody{padding:2px 14px 12px}
 .sub2{margin:12px 0 8px;display:flex;align-items:center;gap:8px}
 .ttag{font-size:12.5px;font-weight:700;color:#0f766e;background:#e6f5f2;padding:3px 10px;border-radius:7px}
 .scnt{color:var(--muted);font-size:12px}.sline{flex:1;height:1px;background:var(--line)}
 .tfilter{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin:12px 0 4px}
 .tfilter .flab{font-size:12px;color:var(--muted);margin-right:2px}
 .tchip{font-size:12px;border:1px solid var(--line);background:#fff;color:#374151;border-radius:999px;padding:4px 11px;cursor:pointer;transition:.12s;line-height:1.3}
 .tchip:hover{border-color:#0f766e}
 .tchip.on{background:#0f766e;border-color:#0f766e;color:#fff}
 .tfilter .tclr{font-size:12px;color:var(--accent);background:none;border:0;cursor:pointer;padding:4px}
 .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:9px}
 .item{border:1px solid var(--line);border-radius:11px;padding:10px 11px;display:flex;flex-direction:column;gap:5px;background:#fff;cursor:pointer;transition:border-color .12s,box-shadow .12s}
 .item:hover{border-color:#c9ccd2}
 .item.sel{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset}
 .item .zh{font-weight:600;font-size:14px}.item .en{color:var(--muted);font-size:11px;font-family:ui-monospace,Menlo,Consolas,monospace}
 .item .row{display:flex;align-items:center;justify-content:space-between;gap:8px}
 .mus{font-size:11px;color:#374151;background:#f1f3f5;border-radius:6px;padding:2px 7px}
 .tags{display:flex;flex-wrap:wrap;gap:5px;align-items:center;min-width:0}
 .diff{font-size:11px;color:#9a3412;background:#ffedd5;border-radius:6px;padding:2px 7px;white-space:nowrap}
 .vids{flex:none}
 .vids a{font-size:12px;text-decoration:none;border-radius:7px;padding:2px 11px;border:1px solid var(--line);color:var(--ink);white-space:nowrap;display:inline-block}
 .vids a.f{color:#be185d;border-color:#f3c6da;background:#fdf2f8}
 .vids a.m2{color:#1d4ed8;border-color:#c3d4f7;background:#eff4ff}
 .vids a.f:hover{background:#fce7f1}.vids a.m2:hover{background:#e2ecfd}
 .vids .novid{font-size:12px;color:#9aa1ab;border:1px dashed var(--line);border-radius:7px;padding:2px 11px;white-space:nowrap;display:inline-block}
 .empty{color:var(--muted);text-align:center;padding:40px}
 footer{color:var(--muted);font-size:12px;text-align:center;padding:22px}
 @media(min-width:1280px){.right{width:460px}}
 @media(max-width:840px){main{flex-direction:column}.right{width:100%;position:static}#bodysvg{max-height:560px}.grphead .bd{display:none}}
</style></head><body>

 const v = vurl?`<a class="${sex==='m'?'m2':'f'}" href="${vurl}" target="_blank">视频</a>`:`<span class="novid">暂无视频</span>`;
 const diff=Number.isFinite(it.difficulty)?it.difficulty:'?';
 return `<div class="item" data-mus="${esc(it.primary)}" data-m0="${esc(it.m0)}"><div class="zh">${esc(it.zh)}</div><div class="en">${esc(it.en)}</div>
  <div class="row"><span class="tags"><span class="mus">${esc(it.primary)}</span><span class="diff" title="难度评分 1-5">难度 ${diff}/5</span></span><span class="vids">${v}</span></div></div>`;
}
function groupHTML(gname,glist,q){
 const key=dim+':'+gname;
 const open = q?true:expanded.has(key);
 const isAct = dim==='m0'&&active===gname;
 const tg=typeGroups(glist);
 const bd=tg.slice(0,6).map(([t,a])=>`${t} ${a.length}`).join(' · ');
 let body='';
 if(open||q){
  const useFilter = open && !q;
  const sel = useFilter ? (typeFilter[key]||new Set()) : new Set();
  if(useFilter && tg.length>1){
   const chips=tg.map(([t,a])=>`<button class="tchip ${sel.has(t)?'on':''}" data-type="${esc(t)}">${esc(t)} ${a.length}</button>`).join('');
   body+=`<div class="tfilter" data-k="${esc(key)}"><span class="flab">动作类型</span>${chips}${sel.size?`<button class="tclr">清除</button>`:''}</div>`;
  }
  tg.forEach(([t,a])=>{
   if(sel.size&&!sel.has(t)) return;
   body+=`<div class="sub2"><span class="ttag">${esc(t)}</span><span class="scnt">${a.length}</span><span class="sline"></span></div><div class="grid">${a.map(itemHTML).join('')}</div>`;
  });
 }
 return `<section class="grp ${open?'':'collapsed'} ${isAct?'active':''}"><div class="grphead" data-k="${esc(key)}" data-g="${esc(gname)}"><span class="chev">▾</span><h2>${esc(gname)}</h2><span class="cnt">${glist.length}</span><span class="bd">${esc(bd)}</span></div><div class="grpbody">${body}</div></section>`;
}
function highlight(muscle){
 const svg=document.getElementById('bodysvg'); if(!svg) return;
 svg.querySelectorAll('.r').forEach(e=>e.classList.remove('hot'));
 const cap=document.getElementById('acap');
 if(!muscle){cap.textContent='尚未选择肌群';return;}
 const regs=MMAP[muscle];
 if(regs&&regs[0]==='ALL'){svg.querySelectorAll('.r').forEach(e=>e.classList.add('hot'));cap.innerHTML=`<b>${esc(muscle)}</b> · 全身参与`;return;}
 if(regs){regs.forEach(r=>{const el=svg.querySelector('[id="'+r+'"]'); if(el) el.classList.add('hot');});cap.innerHTML=`<b>${esc(muscle)}</b>`;}
 else cap.innerHTML=`<b>${esc(muscle)}</b> · 暂无图示`;
}
function highlightExerciseMuscles(primary){
 const svg=document.getElementById('bodysvg'); if(!svg) return;
 svg.querySelectorAll('.r').forEach(e=>e.classList.remove('hot'));
 const cap=document.getElementById('acap');
 const muscles=(primary||'').split(/[、,，\/]/).map(s=>s.trim()).filter(Boolean);
 if(!muscles.length){cap.textContent='尚未选择肌群';return;}
 let allBody=false, any=false;
 muscles.forEach(m=>{
  const regs=MMAP[m];
  if(regs&&regs[0]==='ALL'){allBody=true;any=true;}
  else if(regs){regs.forEach(r=>{const el=svg.querySelector('[id="'+r+'"]'); if(el){el.classList.add('hot');any=true;}});}
 });
 if(allBody) svg.querySelectorAll('.r').forEach(e=>e.classList.add('hot'));
 cap.innerHTML=muscles.map(m=>`<b>${esc(m)}</b>`).join('、')+(any?'':' · 暂无图示');
}
function itemMatchesMuscle(it,muscle){
 return it.m0===muscle||(it.primary||'').split(/[、,，\/]/).map(s=>s.trim()).includes(muscle);
}
function activateMuscle(muscle,scroll=true){
 if(!muscle) return;
 active=muscle;
 const matches=DATA.filter(it=>itemMatchesMuscle(it,muscle));
 if(scroll&&matches.length){
  matches.forEach(it=>expanded.add('cat:'+META.catLabel[it.cat]));
  render();
  const item=[...document.querySelectorAll('.item')].find(el=>el.dataset.m0===muscle||(el.dataset.mus||'').split(/[、,，\/]/).map(s=>s.trim()).includes(muscle));
  if(item){item.classList.add('sel');item.scrollIntoView({block:'nearest',behavior:'smooth'});}
 } else {
  render();
 }
 highlight(active);
}
function muscleForRegion(region){
 const candidates=REGION_TO_MUSCLES[region]||[];
 return candidates.filter(m=>DATA.some(it=>it.m0===m)).sort((a,b)=>orderIndex(CLICK_MUSCLE_PRIORITY,a)-orderIndex(CLICK_MUSCLE_PRIORITY,b))[0]||candidates[0]||null;
}
function wireBodyMap(){
 const svg=document.getElementById('bodysvg'); if(!svg) return;
 svg.querySelectorAll('.r').forEach(el=>{
  const muscle=muscleForRegion(el.id);
  if(muscle){el.dataset.muscle=muscle;el.setAttribute('role','button');el.setAttribute('tabindex','0');el.setAttribute('aria-label',muscle);}
 });
 svg.addEventListener('click',e=>{const part=e.target.closest('.r[data-muscle]');if(part) activateMuscle(part.dataset.muscle);});
 svg.addEventListener('keydown',e=>{if(e.key!=='Enter'&&e.key!==' ') return;const part=e.target.closest('.r[data-muscle]');if(part){e.preventDefault();activateMuscle(part.dataset.muscle);}});
}
function render(){
 const app=document.getElementById('app');
 const q=query.trim().toLowerCase();
 const data=q?DATA.filter(it=>(it.zh+' '+it.en+' '+it.primary+' '+it.typ+' 难度 '+(it.difficulty||'')).toLowerCase().includes(q)):DATA;
 if(!data.length){app.innerHTML=`<div class="empty">没有匹配「${esc(query)}」的动作</div>`;return;}
 let html='';
 if(dim==='m0'){
  areaGroups(data).forEach(([area,groups])=>{
   const total=groups.reduce((n,[,glist])=>n+glist.length,0);
   html+=`<section class="area"><div class="areahead"><h2>${esc(area)}</h2><span>${groups.length} 个肌群 · ${total} 个动作</span></div>${groups.map(([gname,glist])=>groupHTML(gname,glist,q)).join('')}</section>`;
  });
 } else {
  firstGroups(data).forEach(([gname,glist])=>{html+=groupHTML(gname,glist,q);});
 }
 app.innerHTML=html;
 app.querySelectorAll('.grphead').forEach(h=>h.onclick=()=>{
  const k=h.dataset.k,g=h.dataset.g;
  if(expanded.has(k)){expanded.delete(k); if(active===g){active=null;}}
  else {expanded.add(k); if(dim==='m0'){active=g;}}
  render(); highlight(active);
 });
 app.querySelectorAll('.tchip').forEach(c=>c.onclick=e=>{
  e.stopPropagation();
  const k=c.closest('.tfilter').dataset.k, t=c.dataset.type;
  const cur=typeFilter[k];
  if(cur&&cur.has(t)) delete typeFilter[k]; else typeFilter[k]=new Set([t]);
  render();
 });
 app.querySelectorAll('.tclr').forEach(b=>b.onclick=e=>{
  e.stopPropagation();
  const k=b.closest('.tfilter').dataset.k;
  delete typeFilter[k]; render();
 });
 app.querySelectorAll('.item').forEach(el=>el.onclick=e=>{
  if(e.target.closest('a')) return;
  app.querySelectorAll('.item.sel').forEach(x=>x.classList.remove('sel'));
  el.classList.add('sel');
  highlightExerciseMuscles(el.dataset.mus);
 });
}
document.getElementById('q').addEventListener('input',e=>{query=e.target.value;render();});
document.querySelectorAll('#sex button').forEach(b=>b.onclick=()=>{sex=b.dataset.s;document.querySelectorAll('#sex button').forEach(x=>x.classList.toggle('on',x===b));render();});
document.getElementById('exp').onclick=()=>{firstGroups(query?DATA.filter(it=>(it.zh+it.en+it.primary+it.typ).toLowerCase().includes(query.toLowerCase())):DATA).forEach(([g])=>expanded.add(dim+':'+g));render();};
document.getElementById('col').onclick=()=>{expanded.clear();active=null;render();highlight(null);};
wireBodyMap(); render(); highlight(null);
</script></body></html>
