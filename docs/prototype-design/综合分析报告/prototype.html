<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>综合分析报告 · 交互原型</title>
<style>
  :root{
    --brand:#2563eb; --weight:#16a34a; --sleep:#4f46e5; --exercise:#ea580c;
    --success:#16a34a; --warn:#ea580c; --travel:#a16207; --drink:#7c3aed;
    --appBg:#f5f6f8; --card:#ffffff; --weightBg:#ecf6ef; --sleepBg:#eef0fd; --exBg:#fdf2ec;
    --t1:#1a1f29; --t2:#6b7280; --t3:#9aa1ab; --hair:#ededf0;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; background:#e7e9ee; font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Segoe UI",sans-serif; color:var(--t1); padding:24px 0 60px; display:flex; flex-direction:column; align-items:center; gap:18px;}
  .demoBar{display:flex; gap:8px; align-items:center; background:#fff; border:1px solid var(--hair); border-radius:14px; padding:8px 12px; flex-wrap:wrap; max-width:360px;}
  .demoBar b{font-size:12px; color:var(--t2); font-weight:600;}
  .demoBar button{font-size:12px; border:1px solid var(--hair); background:#fff; color:var(--t1); border-radius:9px; padding:5px 10px; cursor:pointer;}
  .demoBar button.on{background:var(--brand); color:#fff; border-color:var(--brand);}
  .phone{width:340px; background:var(--appBg); border-radius:38px; border:9px solid #11151c; overflow:hidden; box-shadow:0 12px 36px rgba(0,0,0,.22);}
  .nav{background:#fff; padding:12px 18px 11px; border-bottom:1px solid var(--hair); position:relative;}
  .navRow{display:flex; align-items:center; justify-content:space-between;}
  .navRow .side{font-size:15px; color:var(--brand); cursor:pointer; min-width:48px;}
  .navRow .side.right{text-align:right;}
  .navRow .title{font-size:15px; font-weight:600;}
  .subTitle{margin-top:6px; font-size:12px; color:var(--t3); text-align:center;}
  .scroll{height:560px; overflow-y:auto; padding:14px 14px 26px; scroll-behavior:smooth;}
  .scroll::-webkit-scrollbar{width:0;}
  .card{background:var(--card); border:1px solid var(--hair); border-radius:16px; box-shadow:0 2px 8px rgba(0,0,0,.04); padding:15px; margin-bottom:12px;}
  .secTitle{font-size:14px; font-weight:600; display:flex; align-items:center; gap:6px;}
  .li{display:flex; gap:10px; margin-top:12px; font-size:12px; line-height:1.6;}
  .li .ic{font-size:16px; line-height:1.3; flex:none;}
  .li b{font-weight:600;}
  .muted{color:var(--t3);}
  .homeBar{height:5px; width:120px; background:#11151c; border-radius:3px; margin:10px auto;}

  /* range picker */
  .pickWrap{padding:8px 4px;}
  .pickTitle{font-size:20px; font-weight:700; margin:6px 4px 2px;}
  .pickDesc{font-size:13px; color:var(--t2); margin:0 4px 18px; line-height:1.6;}
  .chips{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:18px;}
  .chip{flex:1 0 28%; text-align:center; padding:14px 0; border-radius:14px; border:1.5px solid var(--hair); background:#fff; font-size:14px; font-weight:600; cursor:pointer;}
  .chip.on{border-color:var(--brand); background:#eef4fd; color:var(--brand);}
  .rangeBox{background:#fff; border:1px solid var(--hair); border-radius:14px; padding:14px; margin-bottom:14px;}
  .rangeRow{display:flex; justify-content:space-between; align-items:center; font-size:14px; padding:8px 2px;}
  .rangeRow + .rangeRow{border-top:1px solid var(--hair);}
  .rangeRow input{border:none; font-size:14px; color:var(--brand); text-align:right; font-family:inherit; background:transparent;}
  .hint{font-size:12px; color:var(--t3); margin:2px 4px 18px; line-height:1.5;}
  .hint.err{color:var(--warn);}
  .cta{position:sticky; bottom:0; padding-top:6px;}
  .cta button{width:100%; padding:14px; border:none; border-radius:14px; background:var(--brand); color:#fff; font-size:15px; font-weight:600; cursor:pointer;}
  .cta button:disabled{background:#c4d3ea;}

  /* overview metrics */
  .metricRow{display:flex; gap:8px; margin-top:13px;}
  .metric{flex:1; border-radius:10px; padding:9px; text-align:center;}
  .metric .v{font-size:15px; font-weight:600;}
  .metric .k{font-size:10px; color:var(--t3); margin-top:1px;}
  .summaryText{font-size:12px; color:var(--t2); line-height:1.75; margin-top:10px;}
  .conversationCard{padding:15px;}
  .duckByline{display:flex; align-items:center; gap:9px; margin-bottom:10px;}
  .duckAvatar{width:40px; height:40px; border-radius:12px; object-fit:cover; flex:none; box-shadow:0 2px 7px rgba(146,103,12,.16);}
  .speaker{font-size:13px; font-weight:600; line-height:1.45;}
  .speaker span{display:block; font-size:10px; font-weight:400; color:var(--t3);}
  .duckSays{background:#fffaeb; border:1px solid #fce9b8; border-left:3px solid #efbd3e; border-radius:5px 14px 14px 5px; padding:12px; text-align:left;}
  .duckSays .ln{font-size:14px; font-weight:600; line-height:1.5;}

  /* soup */
  .soup{background:#fffaeb; border:1px solid #fce9b8; border-radius:16px; padding:16px; margin-bottom:12px;}
  .soup .hd{display:flex; align-items:center; gap:8px; font-size:12px; font-weight:600; color:#92670c;}
  .soupAvatar{width:24px; height:24px; border-radius:7px; object-fit:cover;}
  .soup .body{font-family:Georgia,"Songti SC",serif; font-size:14px; color:var(--t1); line-height:1.9; margin-top:10px; min-height:74px;}
  .soup .foot{margin-top:10px; font-size:11px; color:#b88a1e; text-align:right; cursor:pointer; user-select:none;}
  .tagPos{font-size:10px; color:#16653a; background:#e7f6ec; padding:2px 8px; border-radius:8px;}
  .tagNeg{font-size:10px; color:#9a3412; background:#fdecdf; padding:2px 8px; border-radius:8px;}
</style>
</head>
<body>

<div class="demoBar">
  <b>演示场景</b>
  <button data-sc="up" class="on" onclick="setScenario('up')">进步期</button>
  <button data-sc="down" onclick="setScenario('down')">反弹期</button>
  <button data-sc="flat" onclick="setScenario('flat')">平稳期</button>
  <span style="font-size:11px;color:var(--t3)">← 切换看报告与寄语如何随数据变化</span>
</div>

<div class="phone">
  <!-- ===== Screen 1: 时间段选择 ===== -->
  <div id="screenPick">
    <div class="nav">
      <div class="navRow">
        <span class="side" onclick="alert('返回「我的」')"><span style="font-size:18px;">‹</span> 我的</span>
        <span class="title">综合分析</span>
        <span class="side right">&nbsp;</span>
      </div>
    </div>
    <div class="scroll">
      <div class="pickWrap">
        <div class="pickTitle">选择分析区间</div>
        <p class="pickDesc">选一段时间，小鸭帮你把这段日子里的减脂、运动、睡眠拉到一起复盘。最长支持 3 个月。</p>
        <div class="chips" id="presetChips">
          <div class="chip" data-days="7" onclick="pickPreset(7)">近一周</div>
          <div class="chip on" data-days="30" onclick="pickPreset(30)">近一个月</div>
          <div class="chip" data-days="90" onclick="pickPreset(90)">近三个月</div>
        </div>
        <div class="rangeBox">
          <div class="rangeRow"><span>开始</span><input id="startDate" type="date"></div>
          <div class="rangeRow"><span>结束</span><input id="endDate" type="date"></div>
        </div>
        <p class="hint" id="rangeHint">已选 30 天 · 区间内约有数据 27 天</p>
        <div class="cta"><button id="confirmBtn" onclick="goReport()">生成报告</button></div>
      </div>
    </div>
    <div class="homeBar"></div>
  </div>

  <!-- ===== Screen 2: 报告 ===== -->
  <div id="screenReport" style="display:none;">
    <div class="nav">
      <div class="navRow">
        <span class="side" onclick="backToPick()"><span style="font-size:18px;">‹</span> 区间</span>
        <span class="title">综合分析报告</span>
        <span class="side right" onclick="alert('导出 / 分享报告')">⤴</span>
      </div>
      <div class="subTitle" id="reportSub">2026.05.22 – 2026.06.20 · 较上一周期对比</div>
    </div>
    <div class="scroll" id="reportScroll">
      <!-- ① 概览 -->
      <div class="card conversationCard">
        <div class="duckByline">
          <img class="duckAvatar" src="../../HealthApp/Assets.xcassets/AppIcon.appiconset/AppIcon-1024.png" alt="小鸭教练">
          <div class="speaker">小鸭教练说<span>给你的周期小结</span></div>
        </div>
        <div class="duckSays">
          <div class="ln" id="ovHead">这段时间，你和我一起做到了这些 👇</div>
          <div class="summaryText" id="ovText"></div>
          <div class="metricRow">
            <div class="metric" style="background:var(--weightBg)"><div class="v" id="mW" style="color:var(--weight)"></div><div class="k">体重变化</div></div>
            <div class="metric" style="background:var(--exBg)"><div class="v" id="mF" style="color:var(--exercise)"></div><div class="k">运动频率</div></div>
            <div class="metric" style="background:var(--sleepBg)"><div class="v" id="mS" style="color:var(--sleep)"></div><div class="k">日均睡眠</div></div>
          </div>
        </div>
      </div>

      <!-- ② 做得好 -->
      <div class="card">
        <div class="secTitle" style="color:var(--success)">👍 做得好的地方</div>
        <div id="goodsList"></div>
      </div>

      <!-- ③ 要注意 -->
      <div class="card">
        <div class="secTitle" style="color:var(--warn)">⚠️ 需要注意的地方</div>
        <div id="risksList"></div>
      </div>

      <!-- ④ 暖心寄语 -->
      <div class="soup">
        <div class="hd"><img class="soupAvatar" src="../../HealthApp/Assets.xcassets/AppIcon.appiconset/AppIcon-1024.png" alt=""> 小鸭想对你说</div>
        <div class="body" id="soupBody"></div>
      </div>
    </div>
    <div class="homeBar"></div>
  </div>
</div>

<script>
/* ---------------- 模拟数据：三种数据情绪场景 ---------------- */
const SCENARIOS = {
  up: {  // 进步期：减脂顺、正反馈多
    metrics:{w:"−3.4kg", f:"4.0次/周", s:"7.1h"},
    summary:`减脂总体<b style="color:var(--weight)">稳步向好</b>，从 85.2kg 降到 81.8kg，累计 <b>−3.4kg</b>；运动共 <b>52 次 / 38.6 小时</b>，以跑步和力量为主，强度比上一周期更扎实。`,
    goods:[
      {ic:"✅",h:`运动次数 <b style="color:var(--success)">↑ 12 次</b>`,t:"（40→52），坚持度明显上来了"},
      {ic:"✅",h:`饮酒 <b style="color:var(--success)">↓ 6 次</b>`,t:"，对睡眠和代谢都是利好"},
      {ic:"✅",h:`跑步平均心率 <b style="color:var(--success)">↓ 6 bpm</b>`,t:"，心肺更强了"},
      {ic:"✅",h:`最长连续打卡 <b style="color:var(--success)">11 天</b>`,t:"，刷新纪录"},
    ],
    risks:[
      {ic:"✈️",h:`<b style="color:var(--travel)">出行（5.20–6.02）</b>`,t:"致运动中断 9 天，体重一度反弹 +0.8kg"},
      {ic:"🌙",h:`入睡忽早忽晚，波动 <b style="color:var(--warn)">±58min</b>`,t:"，达标率仅 62%"},
    ],
    sentiment:"positive"
  },
  down:{ // 反弹期：体重上升、频率下滑
    metrics:{w:"+1.6kg", f:"2.1次/周", s:"6.4h"},
    summary:`这段时间减脂<b style="color:var(--warn)">出现反复</b>，体重从 80.2kg 回到 81.8kg（<b>+1.6kg</b>）；运动共 28 次 / 19 小时，频率较上一周期有所回落——别灰心，找回节奏就好。`,
    goods:[
      {ic:"✅",h:`力量训练占比 <b style="color:var(--success)">↑ 至 32%</b>`,t:"，肌肉刺激更足"},
      {ic:"✅",h:`深睡占比 <b style="color:var(--success)">↑ 3%</b>`,t:"，睡眠结构在改善"},
    ],
    risks:[
      {ic:"📈",h:`体重回升 <b style="color:var(--warn)">+1.6kg</b>`,t:"，连续两周未下降，进入反弹趋势"},
      {ic:"📉",h:`运动频率 <b style="color:var(--warn)">↓ 至 2.1 次/周</b>`,t:"（上一周期 3.8），明显松动"},
      {ic:"🍷",h:`饮酒 <b style="color:var(--drink)">↑ 5 次</b>`,t:"，当晚睡眠效率平均下降 8%"},
      {ic:"🌙",h:`日均睡眠跌到 <b style="color:var(--warn)">6.4h</b>`,t:"，达标率仅 41%"},
    ],
    sentiment:"negative"
  },
  flat:{ // 平稳期
    metrics:{w:"−0.3kg", f:"3.2次/周", s:"7.0h"},
    summary:`这段时间各项指标<b>大体平稳</b>：体重基本持平（−0.3kg），运动 41 次 / 30 小时，睡眠 7.0h——稳住了，但也到了可以再推一把的时候。`,
    goods:[
      {ic:"✅",h:`运动频率稳定在 <b style="color:var(--success)">3.2 次/周</b>`,t:"，习惯已经养成"},
      {ic:"✅",h:`入睡时间波动收窄到 <b style="color:var(--success)">±31min</b>`,t:"，越来越规律"},
      {ic:"✅",h:`饮酒与上一周期持平`,t:"，没有反弹"},
    ],
    risks:[
      {ic:"⚖️",h:`体重进入 <b style="color:var(--warn)">平台期</b>`,t:"，近 3 周变化 < 0.3kg"},
      {ic:"🔥",h:`运动强度偏低`,t:"，高强度次数占比仅 18%，可适当加量"},
    ],
    sentiment:"neutral"
  }
};

/* ---------------- 暖心寄语库：按数据情绪分三类 ---------------- */
const SOUP = {
  positive:[ // 进步期：肯定 + 鼓励
    "你不是在和体重较劲，<br>而是在和昨天那个想偷懒的自己赛跑。<br>这段日子，你赢的次数更多了。",
    "自律不是苦行，<br>是你给未来的自己悄悄存下的底气。<br>这一程，存得很满。",
    "小鸭看得见——<br>你每一次迈出门的脚步，<br>都正在把更好的身体一点点养大。",
    "了不起的不是数字变小了，<br>而是你把「坚持」过成了习惯。",
    "你做到的，<br>是很多人只在年初想想的事。<br>继续，别回头。",
    "汗水不会撒谎，<br>它把你这段日子的认真，<br>都写进了更轻盈的身体里。",
  ],
  negative:[ // 反弹期：打气 + 安慰，不指责
    "起伏是减脂的常态，<br>真正重要的，是你愿意翻开这页报告——<br>那说明你还没放弃自己。",
    "反弹不可怕，<br>怕的是因为一次后退，<br>就把走过的整条路都否定掉。",
    "小鸭不挑你跑得快不快，<br>只看你今天有没有，<br>愿意重新迈出那一步。",
    "把这周期当作一次提醒，<br>不是失败的证据。<br>明天，我们从一顿好觉开始。",
    "身体偶尔会任性，<br>但你比上个月更懂它了。<br>这本身，就是进步。",
    "慢一点没关系，<br>停下来回头看看，再出发——<br>我一直在这儿等你。",
  ],
  neutral:[ // 平稳期：陪伴 + 推一把
    "稳住，是一种被低估的能力。<br>你已经做到了，<br>接下来，可以试着再推自己一把。",
    "平台期不是终点，<br>是身体在问你：<br>「准备好迎接下一阶段了吗？」",
    "把每一个平凡的坚持日子叠起来，<br>就是别人眼里的「天生自律」。",
    "你没有退步，<br>这本身就值得肯定。<br>现在，给目标加一点点新鲜感吧。",
    "和昨天打平，<br>也是一种不输。<br>但小鸭相信，你还能更好。",
    "习惯已经长在身上了，<br>剩下的，就是给它一个新方向。",
  ]
};

/* ---------------- 状态 ---------------- */
let curScenario = "up";
let curDays = 30;

function setScenario(sc){
  curScenario = sc;
  document.querySelectorAll('.demoBar button[data-sc]').forEach(b=>b.classList.toggle('on', b.dataset.sc===sc));
  if(document.getElementById('screenReport').style.display!=='none') renderReport();
}

/* ---------------- 时间段选择 ---------------- */
function pickPreset(days){
  document.querySelectorAll('#presetChips .chip').forEach(c=>c.classList.toggle('on', +c.dataset.days===days));
  if(days>0){ curDays=days; updateHint(); syncDateInputs(days); }
}
function syncDateInputs(days){
  const end=new Date('2026-06-20'); const start=new Date(end); start.setDate(end.getDate()-days+1);
  document.getElementById('endDate').value=end.toISOString().slice(0,10);
  document.getElementById('startDate').value=start.toISOString().slice(0,10);
}
function updateHint(){
  const h=document.getElementById('rangeHint'); const btn=document.getElementById('confirmBtn');
  if(curDays>92){ h.textContent=`已选 ${curDays} 天 · 超过 3 个月上限，请缩短区间`; h.classList.add('err'); btn.disabled=true; }
  else { h.textContent=`已选 ${curDays} 天 · 区间内约有数据 ${Math.round(curDays*0.9)} 天`; h.classList.remove('err'); btn.disabled=false; }
}
['startDate','endDate'].forEach(id=>document.getElementById(id).addEventListener('change',()=>{
  const s=new Date(document.getElementById('startDate').value), e=new Date(document.getElementById('endDate').value);
  if(s&&e&&e>=s){
    curDays=Math.round((e-s)/864e5)+1;
    document.querySelectorAll('#presetChips .chip').forEach(c=>c.classList.toggle('on', +c.dataset.days===curDays));
    updateHint();
  }
}));

function goReport(){
  document.getElementById('screenPick').style.display='none';
  document.getElementById('screenReport').style.display='block';
  renderReport();
}
function backToPick(){
  document.getElementById('screenReport').style.display='none';
  document.getElementById('screenPick').style.display='block';
}

/* ---------------- 报告渲染 ---------------- */
function liHTML(item){
  return `<div class="li"><span class="ic">${item.ic}</span><div>${item.h}<span class="muted">${item.t}</span></div></div>`;
}
function renderReport(){
  const d=SCENARIOS[curScenario];
  const start=document.getElementById('startDate').value.replaceAll('-', '.');
  const end=document.getElementById('endDate').value.replaceAll('-', '.');
  document.getElementById('reportSub').textContent=`${start} – ${end} · 较上一周期对比`;
  document.getElementById('ovText').innerHTML=d.summary;
  document.getElementById('mW').textContent=d.metrics.w;
  document.getElementById('mF').textContent=d.metrics.f;
  document.getElementById('mS').textContent=d.metrics.s;
  // 各角度最多 4 条（设计规则：按显著性排序后截断）
  document.getElementById('goodsList').innerHTML=d.goods.slice(0,4).map(liHTML).join('');
  document.getElementById('risksList').innerHTML=d.risks.slice(0,4).map(liHTML).join('');
  rollSoup(); // 按情绪选类 + 同类随机
}
function rollSoup(){
  const s=SCENARIOS[curScenario].sentiment;
  const pool=SOUP[s];
  const text=pool[Math.floor(Math.random()*pool.length)];
  document.getElementById('soupBody').innerHTML='“'+text+'”';
}

/* init */
syncDateInputs(30); updateHint();
</script>
</body>
</html>
